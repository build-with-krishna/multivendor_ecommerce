<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input type="email"
name="email"
class="form-control mb-3"
placeholder="Email">


<input type="password"
name="password"
class="form-control mb-3"
placeholder="Password">

<button class="btn btn-success">
Login
</button>

</form>

<p class="text-danger">
{{error}}
</p>

<a href="{% url 'register' %}">
Create account
</a>

</div>

</body>
</html>
