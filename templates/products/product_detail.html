{% extends 'base.html' %}

{% block content %}

<!DOCTYPE html>
<html>
<head>

<title>{{product.name}}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<div class="row">

<div class="col-md-4">

<img src="{{product.image.url}}"
class="img-fluid">

</div>

<div class="col-md-8">

<h2>
{{product.name}}
</h2>

<h4>

₹

{% if product.discount_price > 0 %}
{{product.discount_price}}
<del>
{{product.price}}
</del>
{% else %}
{{product.price}}
{% endif %}

</h4>

<p>
{{product.description}}
</p>

<p>
Stock :
{{product.stock}}
</p>

<a href="{% url 'add_to_cart' product.id %}"
class="btn btn-success">

Add To Cart

</a>

</div>

</div>

</div>

</body>
</html>

{% endblock %}
