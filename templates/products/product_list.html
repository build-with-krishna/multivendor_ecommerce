{% extends 'base.html' %}

{% block content %}
<!DOCTYPE html>
<html>
<head>

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<div class="row">

{% for p in products %}

<div class="col-md-3 mb-3">

<div class="card">

<img src="{{p.image.url}}"
height="220">

<div class="card-body">

<h5>
{{p.name}}
</h5>

<p>

₹

{% if p.discount_price > 0 %}

{{p.discount_price}}

<del>
{{p.price}}
</del>

{% else %}

{{p.price}}

{% endif %}

</p>

<a href="{% url 'product_detail' p.id %}"
class="btn btn-primary">

View

</a>

<a href="{% url 'add_to_cart' p.id %}"
class="btn btn-success">

Add To Cart

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
{% endblock %}
