<!DOCTYPE html>
<html>
<head>

<title>Vendor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h1>{{vendor.store_name}}</h1>

{% if vendor.logo %}
<img src="{{vendor.logo.url}}" width="150">
{% endif %}

<hr>

<p>
GST :
{{vendor.gst_number}}
</p>

<p>
PAN :
{{vendor.pan_number}}
</p>

<p>
Address :
{{vendor.address}}
</p>

<p>
Approved :
{{vendor.approved}}
</p>

</div>

</body>
</html>
