{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>My Orders</h2>

<table class="table table-bordered">

<tr>

<th>Order ID</th>

<th>Total</th>

<th>Status</th>

<th>Date</th>

</tr>

{% for order in orders %}

<tr>

<td>

#{{order.id}}

</td>

<td>

₹{{order.total_amount}}

</td>

<td>

{{order.status}}

</td>

<td>

{{order.created_at}}

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
