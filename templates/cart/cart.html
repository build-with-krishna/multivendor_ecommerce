{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Shopping Cart</h2>

<table class="table table-bordered">

<tr>

<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>

</tr>

{% for key,item in cart.items %}

<tr>

<td>

<img src="{{item.image}}"
width="80">

</td>

<td>

{{item.name}}

</td>

<td>

₹{{item.price}}

</td>

<td>

{{item.quantity}}

</td>

<td>

₹{{item.price|floatformat:2}}

</td>

<td>

<a href="{% url 'remove_cart' key %}"
class="btn btn-danger">

Remove

</a>

</td>

</tr>

{% endfor %}

</table>

<h3>

Grand Total :

₹{{total}}

</h3>

<a href="{% url 'checkout' %}"
class="btn btn-success">

Proceed To Checkout

</a>

</div>

{% endblock %}
