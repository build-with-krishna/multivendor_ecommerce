<!DOCTYPE html>
<html>
<head>

<title>Categories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2>Categories</h2>

<a href="{% url 'add_category' %}"
class="btn btn-primary mb-3">
Add Category
</a>

<div class="row">

{% for category in categories %}

<div class="col-md-3">

<div class="card">

{% if category.image %}
<img src="{{category.image.url}}" height="200">
{% endif %}

<div class="card-body">

<h5>
{{category.name}}
</h5>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
